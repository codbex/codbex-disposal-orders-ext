name: Release - Module

on:
  workflow_dispatch:
    inputs:
      release-version:
        description: Release Version
        required: true
        default: 1.0.0

run-name: 'version set to ${{ inputs.release-version }} for release'

jobs:
  main:
    uses: codbex/codbex-infra/.github/workflows/module-release.yaml@main
    with:
      packages: codbex-disposal-orders-ext
      packages-build: codbex-disposal-orders-ext
      release-version: ${{ inputs.release-version }}
      release-content: |
        ## codbex-disposal-orders-ext - ${{ inputs.release-version }}
        
        Disposal Orders Management Module
        
        ## Installation
        
        ```
        npm install @codbex/codbex-disposal-orders-ext@${{ inputs.release-version }}
        ```
        
        ## Access points:
        
        - N/A
    secrets: inherit